services:
  # ──────────────────────────────────────────────
  #  TRAEFIK — Reverse Proxy + Auto SSL
  # ──────────────────────────────────────────────
  traefik:
    image: traefik:v3.4
    restart: unless-stopped
    command:
      # API / Dashboard
      - "--api.dashboard=false"
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=mautrade_web"
      # HTTP entrypoint → redirect to HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # HTTPS entrypoint
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      - "--entrypoints.websecure.http.tls.certResolver=letsencrypt"
      # Let's Encrypt ACME
      - "--certificatesresolvers.letsencrypt.acme.email=${CERTBOT_EMAIL:-admin@mautrade.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      # Logging
      - "--log.level=WARN"
      - "--accesslog=false"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - mautrade_letsencrypt:/letsencrypt
    networks:
      - web
      - internal

  # ──────────────────────────────────────────────
  #  FRONTEND — Nuxt SSR Production
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: https://${DOMAIN:-mautrade.com}/api/v1
      NITRO_PORT: 3000
      NITRO_HOST: 0.0.0.0
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mautrade_web"
      # Route: all requests to frontend (lowest priority)
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-mautrade.com}`) || Host(`www.${DOMAIN:-mautrade.com}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      # WWW → non-WWW redirect
      - "traefik.http.routers.www-redirect.rule=Host(`www.${DOMAIN:-mautrade.com}`)"
      - "traefik.http.routers.www-redirect.entrypoints=websecure"
      - "traefik.http.routers.www-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.www-redirect.priority=2"
      - "traefik.http.routers.www-redirect.middlewares=www-to-non-www"
      - "traefik.http.middlewares.www-to-non-www.redirectregex.regex=^https://www\\.(.*)"
      - "traefik.http.middlewares.www-to-non-www.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-to-non-www.redirectregex.permanent=true"
    networks:
      - web
    depends_on:
      api:
        condition: service_started

  # ──────────────────────────────────────────────
  #  GO API — Backend
  # ──────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${DB_USER:-mautrade}:${DB_PASSWORD:-mautrade}@postgres:5432/${DB_NAME:-mautrade}?sslmode=disable
      NATS_URL: nats://nats:4222
      ALLOWED_CORS_ORIGIN: https://${DOMAIN:-mautrade.com}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=mautrade_web"
      # Route: /api/* to Go API (higher priority than frontend)
      - "traefik.http.routers.api.rule=Host(`${DOMAIN:-mautrade.com}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
      # Security headers middleware
      - "traefik.http.routers.api.middlewares=security-headers"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      keydb:
        condition: service_started

  # ──────────────────────────────────────────────
  #  INFRASTRUCTURE — Internal only
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-mautrade}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mautrade}
      POSTGRES_DB: ${DB_NAME:-mautrade}
    volumes:
      - mautrade_postgres:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mautrade} -d ${DB_NAME:-mautrade}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  nats:
    image: nats:2.12
    restart: unless-stopped
    command: ["-js", "-sd", "/data"]
    volumes:
      - mautrade_nats:/data
    networks:
      - internal

  keydb:
    image: eqalpha/keydb:x86_64_v6.3.4
    restart: unless-stopped
    command: ["keydb-server", "--appendonly", "yes"]
    volumes:
      - mautrade_keydb:/data
    networks:
      - internal

  questdb:
    image: questdb/questdb:8.3.3
    restart: unless-stopped
    volumes:
      - mautrade_questdb:/var/lib/questdb
    networks:
      - internal

# ──────────────────────────────────────────────
#  NETWORKS
# ──────────────────────────────────────────────
networks:
  web:
    name: mautrade_web
  internal:
    name: mautrade_internal

# ──────────────────────────────────────────────
#  VOLUMES (persistent across deploys)
# ──────────────────────────────────────────────
volumes:
  mautrade_letsencrypt:
  mautrade_postgres:
  mautrade_nats:
  mautrade_keydb:
  mautrade_questdb:
